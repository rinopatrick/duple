<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="description" content="Duple — Your open-source relationship sidekick. Track food favorites, cycle predictions, mood patterns, gift wishlists, and get personalized AI advice. 100% private, all data stays on your device." />
    <meta name="keywords" content="relationship tracker, couple app, partner tracker, anniversary reminder, cycle tracker, gift wishlist, love language, private" />
    <meta name="author" content="Duple" />
    <meta property="og:title" content="Duple — Your Relationship Sidekick" />
    <meta property="og:description" content="Open-source, local-first relationship management. Track everything about your partner and get AI-powered advice. 100% private." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tryduple.vercel.app" />
    <meta name="twitter:card" content="summary" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💙</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6366f1" />
    <title>Duple</title>
    <script>
      // Force clear any stale caches and unregister old service workers
      if ('caches' in window) {
        caches.keys().then(names => names.forEach(n => caches.delete(n)));
      }
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
