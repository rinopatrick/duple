name: CI/CD

on:
  push:
    branches: [master]
    tags:
      - 'v*'
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm ci
      - run: npm test

  build-web:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/

  build-desktop:
    needs: test
    if: github.ref == 'refs/heads/master'
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: windows
            ext: .exe
          - os: ubuntu-latest
            name: linux
            ext: .AppImage
          - os: macos-latest
            name: macos
            ext: .dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Linux deps
        if: matrix.name == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: npm ci
      - run: npm run build
      - name: Build Tauri
        run: |
          npm install -g @tauri-apps/cli@^2
          cd src-tauri
          cargo tauri build
      - uses: actions/upload-artifact@v4
        with:
          name: duple-${{ matrix.name }}
          path: src-tauri/target/release/bundle/

  release:
    needs: build-desktop
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            duple-windows/**/*.exe
            duple-windows/**/*.msi
            duple-linux/**/*.AppImage
            duple-macos/**/*.dmg
          draft: false
